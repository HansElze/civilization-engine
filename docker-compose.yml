version: '3.8'

services:
  # Constitutional Governance Layer
  governance:
    build: 
      context: .
      dockerfile: governance/Dockerfile
    container_name: cuttlefish-governance
    environment:
      - CONSTITUTION_VERSION=1.2
      - TRUST_DECAY_RATE=0.05
      - LOG_LEVEL=INFO
    volumes:
      - ./constitution:/app/constitution:ro
      - governance-data:/app/data
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Knowledge Layer (RAG Engine)
  knowledge:
    build:
      context: .
      dockerfile: knowledge/Dockerfile
    container_name: cuttlefish-knowledge
    environment:
      - QDRANT_URL=http://vector-db:6333
      - EMBEDDING_MODEL=sentence-transformers/all-MiniLM-L6-v2
      - LOG_LEVEL=INFO
    volumes:
      - ./knowledge:/app/knowledge:ro
      - knowledge-data:/app/data
    ports:
      - "8002:8000"
    depends_on:
      - vector-db
      - postgres
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Vector Database (Qdrant)
  vector-db:
    image: qdrant/qdrant:latest
    container_name: cuttlefish-vector-db
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - vector-db-data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cuttlefish-postgres
    environment:
      - POSTGRES_DB=cuttlefish
      - POSTGRES_USER=cuttlefish
      - POSTGRES_PASSWORD=cuttlefish2026
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: cuttlefish-redis
    command: redis-server --save 60 1000 --loglevel warning
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Builder Agent
  builder-agent:
    build:
      context: .
      dockerfile: agents/Dockerfile
      args:
        AGENT_TYPE: builder
    container_name: cuttlefish-builder
    environment:
      - AGENT_ID=builder_001
      - AGENT_TYPE=builder
      - CONSTITUTION_URL=http://governance:8000/constitution
      - KNOWLEDGE_URL=http://knowledge:8000
      - TRUST_THRESHOLD=50.0
      - LOG_LEVEL=INFO
    depends_on:
      - governance
      - knowledge
    volumes:
      - builder-data:/app/data
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 60s
      timeout: 15s
      retries: 3
    restart: unless-stopped

  # Agent Orchestrator (Main API)
  orchestrator:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: cuttlefish-orchestrator
    environment:
      - GOVERNANCE_URL=http://governance:8000
      - KNOWLEDGE_URL=http://knowledge:8000
      - BUILDER_URL=http://builder-agent:8000
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=cuttlefish
      - POSTGRES_USER=cuttlefish
      - POSTGRES_PASSWORD=cuttlefish2026
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=INFO
    depends_on:
      - governance
      - knowledge
      - builder-agent
      - postgres
      - redis
    volumes:
      - orchestrator-data:/app/data
    ports:
      - "8000:8000"  # Main API endpoint
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Web Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: cuttlefish-dashboard
    environment:
      - REACT_APP_API_URL=http://localhost:8000
      - REACT_APP_GOVERNANCE_URL=http://localhost:8001
      - REACT_APP_KNOWLEDGE_URL=http://localhost:8002
    ports:
      - "3000:3000"
    depends_on:
      - orchestrator
    restart: unless-stopped

  # Monitoring Stack
  prometheus:
    image: prom/prometheus:latest
    container_name: cuttlefish-prometheus
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cuttlefish-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=cuttlefish2026
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  governance-data:
  knowledge-data:
  vector-db-data:
  postgres-data:
  redis-data:
  builder-data:
  orchestrator-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: cuttlefish-network
    driver: bridge